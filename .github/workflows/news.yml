name: Refresh news feed

on:
  schedule:
    - cron: '17,47 * * * *'   # twice an hour, offset from top-of-hour congestion
  workflow_dispatch:

permissions:
  contents: write

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch news from all sources
        run: node scripts/fetch-news.mjs
      - name: Publish news.json to the news-data branch
        run: |
          mkdir -p /tmp/newsrepo && cd /tmp/newsrepo
          git init -b news-data .
          cp "$GITHUB_WORKSPACE/news.json" .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git commit -m "Update news feed"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" news-data
