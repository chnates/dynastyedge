name: Snapshot dynasty values

on:
  schedule:
    - cron: '41 9 * * *'   # daily, offset from top-of-hour congestion
  workflow_dispatch:

permissions:
  contents: write

# One run at a time — overlapping runs would race their force-pushes of the
# values-history branch and one could clobber the other's snapshot.
concurrency:
  group: values-history

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keepalive — reset the 60-day cron-disable clock
        # GitHub disables scheduled workflows after ~60 days without repo
        # activity, and this workflow's own force-pushes to the data branches
        # do NOT reset that clock — only commits to the default branch do
        # (the standard keepalive-workflow mechanism). When main's last
        # commit is 45+ days old, push an empty bot commit; otherwise no-op.
        # Runs BEFORE the snapshot steps so a failing snapshot during a
        # quiet stretch can't stop the keepalive and let both crons die.
        # GITHUB_TOKEN pushes trigger no other workflows, so no redeploy.
        continue-on-error: true   # a keepalive hiccup must not block the snapshot; it retries daily
        run: |
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "not on main ($GITHUB_REF_NAME) — skipping keepalive"
            exit 0
          fi
          LAST_COMMIT=$(git log -1 --format=%ct)
          AGE_DAYS=$(( ( $(date +%s) - LAST_COMMIT ) / 86400 ))
          echo "last commit on main: ${AGE_DAYS} days ago"
          if [ "$AGE_DAYS" -lt 45 ]; then
            echo "fresh enough — keepalive not needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive commit so scheduled workflows stay enabled"
          git push origin HEAD:main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Append today's FantasyCalc snapshot
        run: node scripts/snapshot-values.mjs
      - name: Archive trade-time values
        continue-on-error: true   # best-effort — publish step preserves the old archive
        run: node scripts/snapshot-trade-values.mjs
      - name: Publish snapshots to the values-history branch
        run: |
          mkdir -p /tmp/valuesrepo && cd /tmp/valuesrepo
          git init -b values-history .
          REMOTE="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          # Missing outputs are recovered from the existing branch via git —
          # a different failure domain than the raw.githubusercontent CDN the
          # snapshot scripts read from, so a correlated script+CDN outage can
          # never force-push the branch without its accumulated data. Any git
          # failure below aborts the step (bash -e): the branch stays
          # untouched today and the next run self-heals.
          PREV="$(git ls-remote "$REMOTE" refs/heads/values-history)"
          PREV="${PREV%%[[:space:]]*}"   # previous head sha; '' if the branch doesn't exist yet
          if [ -n "$PREV" ]; then
            git fetch --depth 1 "$REMOTE" values-history
          fi
          # History: today's output, else the previous file from the branch.
          # This file is the branch's primary artifact, so publishing without
          # it fails loudly.
          if [ -f "$GITHUB_WORKSPACE/values-history.json" ]; then
            cp "$GITHUB_WORKSPACE/values-history.json" .
          elif [ -n "$PREV" ] && git cat-file -e "$PREV:values-history.json" 2>/dev/null; then
            git checkout "$PREV" -- values-history.json
          else
            echo "no values-history.json produced and none recoverable from the branch — aborting publish" >&2
            exit 1
          fi
          # Trade archive: today's output, else the previous file from the
          # branch. The archive is permanent (never pruned) — if it exists on
          # the branch it MUST carry forward; only a branch that never had
          # the file (first runs) may publish without it.
          if [ -f "$GITHUB_WORKSPACE/trade-values.json" ]; then
            cp "$GITHUB_WORKSPACE/trade-values.json" .
          elif [ -n "$PREV" ] && git cat-file -e "$PREV:trade-values.json" 2>/dev/null; then
            git checkout "$PREV" -- trade-values.json
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add values-history.json
          if [ -f trade-values.json ]; then git add trade-values.json; fi
          git commit -m "Update values history"
          git push --force "$REMOTE" values-history
