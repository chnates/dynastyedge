<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Colors Safari's status-bar area to match the app header.
         Kept in sync with the theme toggle by useTheme. -->
    <meta name="theme-color" content="#101013" />
    <!-- Standalone (Add to Home Screen) mode: draw edge-to-edge instead of
         iOS letterboxing the app with black bars. black-translucent makes the
         status bar TRANSPARENT so the app content + ambient glow paint under
         it seamlessly (no solid colored band). iOS forces white status text;
         in dark mode the dark header/glow shows through, and in light mode a
         dark strip (App.jsx, light-mode-only) sits behind the bar to keep the
         clock/battery readable. Changing these requires removing + re-adding
         the home-screen app. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DynastyEdge" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>DynastyEdge</title>
    <!-- ?v=2 busts Safari's stubborn per-site icon cache (Favorites grid) -->
    <link rel="icon" href="favicon.ico?v=2" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="logo.svg?v=2" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2" />
    <!-- Data-API origins gate first data paint on cellular; crossorigin
         because they're hit via fetch() (CORS mode). -->
    <link rel="preconnect" href="https://api.sleeper.app" crossorigin />
    <link rel="preconnect" href="https://api.fantasycalc.com" crossorigin />
    <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
