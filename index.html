<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Status-bar area color. STATIC per-scheme metas (not a runtime JS swap):
         iOS honors prefers-color-scheme theme-color and updates it live, whereas
         a single JS-mutated meta gets cached at launch in standalone mode (that
         cached-swap approach was tried and produced a stuck black band). Each
         value matches the app header in that scheme so the bar and header read
         as one surface. -->
    <meta name="theme-color" content="#E7E9EC" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#101013" media="(prefers-color-scheme: dark)" />
    <!-- Standalone (Add to Home Screen) mode. `default` status-bar-style makes
         iOS draw an OPAQUE status bar and auto-contrast the clock/battery text
         to the appearance (black on light, white on dark) — so no hand-drawn
         dark strip is needed and the bar matches the header in both themes.
         (black-translucent, the prior setting, forced white text and required a
         light-mode dark strip behind it.) Changing these metas only takes effect
         after removing + re-adding the home-screen app. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="DynastyEdge" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>DynastyEdge</title>
    <!-- ?v=3 busts Safari's stubborn per-site icon cache (Favorites grid) -->
    <link rel="icon" href="favicon.ico?v=3" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="logo.svg?v=3" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=3" />
    <!-- Data-API origins gate first data paint on cellular; crossorigin
         because they're hit via fetch() (CORS mode). -->
    <link rel="preconnect" href="https://api.sleeper.app" crossorigin />
    <link rel="preconnect" href="https://api.fantasycalc.com" crossorigin />
    <link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
