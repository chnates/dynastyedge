<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Colors Safari's status-bar area to match the app header.
         Kept in sync with the theme toggle by useTheme. -->
    <meta name="theme-color" content="#16161A" />
    <!-- Standalone (Add to Home Screen) mode: draw edge-to-edge instead of
         iOS letterboxing the app with black bars. No status-bar-style meta:
         modern iOS colors the standalone status bar from theme-color above
         (kept in sync with the app theme by useTheme) and picks readable
         text automatically — so the bar matches the header in both themes.
         Changing these requires removing + re-adding the home-screen app. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="DynastyEdge" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>DynastyEdge</title>
    <!-- ?v=2 busts Safari's stubborn per-site icon cache (Favorites grid) -->
    <link rel="icon" href="favicon.ico?v=2" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="logo.svg?v=2" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
